# Alembic config — the DB URL comes from settings (AGENT_DATABASE_URL in .env),
# injected by alembic/env.py; sqlalchemy.url here is a placeholder.
[alembic]
script_location = alembic
prepend_sys_path = .
sqlalchemy.url = driver://placeholder/overridden-in-env.py

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
