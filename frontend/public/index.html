<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CrimAnalyze — UP Police Data Analyst</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <h1>CrimAnalyze</h1>
      <span id="provider-badge" class="badge" title="Active LLM provider">…</span>
      <span id="mssql-badge" class="badge stub">MsSQL cache off</span>
    </header>

    <section class="card">
      <h2>Investigative data analyst</h2>
      <p class="hint">Upload up to 12 CSV files, optionally enable MsSQL cache mode, ask a question, and receive a grounded insight.</p>

      <div class="form">
        <div class="field">
          <label for="files">Dataset files (CSV)</label>
          <input id="files" type="file" accept=".csv,text/csv" multiple />
        </div>

        <div class="field row">
          <label class="toggle">
            <input id="use-mssql" type="checkbox" />
            <span>Use MsSQL cache mode</span>
          </label>
        </div>

        <div class="field">
          <label for="instruction">Investigator question</label>
          <input id="instruction" type="text"
                 value="Summarize the combined data and answer the question." />
        </div>
      </div>

      <div class="actions">
        <button id="run-btn">Analyze</button>
      </div>

      <div id="status" class="status" hidden></div>
      <div id="error" class="error" hidden></div>

      <div id="result-wrap" hidden>
        <h3>Result</h3>
        <pre id="result"></pre>
        <div id="chart-wrap" hidden>
          <canvas id="chart" width="720" height="360"></canvas>
        </div>
        <p class="meta" id="result-meta"></p>
      </div>
    </section>

    <footer class="foot">
      <span>API docs at <a href="/docs">/docs</a> · health at <a href="/health">/health</a></span>
    </footer>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
